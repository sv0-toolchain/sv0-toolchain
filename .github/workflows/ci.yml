# Full sv0-toolchain: submodules + unified scripts/sv0 harness (SML, C, VM, rewrite, golden, doctests) + sv0-mcp.
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install SML/NJ, C toolchain, Python
        run: |
          sudo apt-get update
          sudo apt-get install -y smlnj build-essential python3

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Check + test + MCP (same as make ci-all)
        run: ./scripts/sv0 ci-all
