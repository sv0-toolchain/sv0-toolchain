# Full sv0-toolchain: submodules + unified scripts/sv0 harness (SML, C, VM, bootstrap-in-sv0, golden,
# doctests) + sv0-mcp. `sv0 test` / `test-guards` include Python checks: block comments, sv0doc baseline,
# task/*.Rmd YAML, README pinned sv0c SHA vs git submodule (verify_readme_sv0c_gitlink.py), VM bytecode
# parity manifest ⊆ bootstrap, milestone-orientation JSON + primary_tasks path existence
# (verify_milestone_orientation.py), and JSON primary_tasks cited in sv0-toolchain-workspace.Rmd
# (verify_workspace_milestone_table.py: forward + reverse vs `## milestone and area tasks`).
# Early CI step runs those Python checks before SML install.
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    steps:
      - name: Use HTTPS for SSH-form submodule URLs in .gitmodules
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Milestone orientation + workspace index consistency (no SML)
        run: |
          python3 scripts/verify_milestone_orientation.py --root .
          python3 scripts/verify_workspace_milestone_table.py --root .
          python3 scripts/milestone_orient.py list

      - name: Cache SML/NJ install
        uses: actions/cache@v4
        id: smlnj-cache
        with:
          path: ~/smlnj-110.99.9
          key: smlnj-110.99.9-${{ runner.os }}-${{ runner.arch }}-curl-v2

      - name: Install SML/NJ (110.99.x; apt package is too old)
        run: bash scripts/ci-install-smlnj.sh

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: |
            **/uv.lock

      - name: Compile smoke (sv0c + sv0vm)
        run: ./scripts/sv0 check

      - name: Full sv0 test harness (./scripts/sv0 test)
        run: ./scripts/sv0 test

      - name: sv0-mcp tests (pytest when uv available)
        run: ./scripts/sv0 test-mcp
